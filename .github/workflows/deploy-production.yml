name: Deploy Production

on:
  workflow_run:
    workflows: ["Backend Test & Quality"]
    types: [completed]
    branches: [main]

jobs:
  deploy-production-aws:
    name: Build, Push, and Deploy to EC2
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Docker image tag
        run: |
          SHORT_SHA="$(printf '%s' '${{ github.event.workflow_run.head_sha }}' | cut -c1-7)"
          echo "IMAGE_TAG=main-${SHORT_SHA}" >> $GITHUB_ENV
          echo "DOCKER_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:main-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          PROD_DB_NAME: ${{ secrets.PROD_DB_NAME }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_JWT_SECRET_KEY: ${{ secrets.PROD_JWT_SECRET_KEY }}
          PROD_MIDTRANS_SERVER_KEY: ${{ secrets.PROD_MIDTRANS_SERVER_KEY }}
          PROD_MIDTRANS_SNAP_BASE_URL: ${{ secrets.PROD_MIDTRANS_SNAP_BASE_URL }}
          PROD_APP_ENV: production
          PROD_DOCKER_IMAGE: ${{ env.DOCKER_IMAGE }}
          PROD_DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          PROD_DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        with:
          host: ${{ secrets.PROD_EC2_HOST }}
          username: ${{ secrets.PROD_EC2_USER }}
          key: ${{ secrets.PROD_EC2_SSH_KEY }}
          envs: PROD_DB_NAME,PROD_DB_USER,PROD_DB_PASSWORD,PROD_JWT_SECRET_KEY,PROD_MIDTRANS_SERVER_KEY,PROD_MIDTRANS_SNAP_BASE_URL,PROD_APP_ENV,PROD_DOCKER_IMAGE,PROD_DOCKERHUB_USERNAME,PROD_DOCKERHUB_TOKEN
          script: |
            set -eu

            APP_DIR="/home/ec2-user/apps/json-backend"

            mkdir -p /home/ec2-user/apps
            if [ ! -d "$APP_DIR/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            chmod +x deploy/scripts/*.sh

            if sudo systemctl list-unit-files | grep -q '^json-backend.service'; then
              sudo systemctl stop json-backend || true
              sudo systemctl disable json-backend || true
            fi

            if ! docker compose version >/dev/null 2>&1; then
              mkdir -p ~/.docker/cli-plugins
              ARCH="$(uname -m)"
              if [ "$ARCH" = "x86_64" ]; then
                COMPOSE_ARCH="x86_64"
              elif [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
                COMPOSE_ARCH="aarch64"
              else
                echo "Unsupported architecture: $ARCH"
                exit 1
              fi
              curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-${COMPOSE_ARCH}" -o ~/.docker/cli-plugins/docker-compose
              chmod +x ~/.docker/cli-plugins/docker-compose
            fi

            docker compose version
            echo "${PROD_DOCKERHUB_TOKEN}" | docker login -u "${PROD_DOCKERHUB_USERNAME}" --password-stdin
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true
            export APP_DIR
            export APP_ENV="${PROD_APP_ENV}"
            export POSTGRES_DB="${PROD_DB_NAME}"
            export POSTGRES_USER="${PROD_DB_USER}"
            export POSTGRES_PASSWORD="${PROD_DB_PASSWORD}"
            export JWT_SECRET_KEY="${PROD_JWT_SECRET_KEY}"
            export MIDTRANS_SERVER_KEY="${PROD_MIDTRANS_SERVER_KEY:-}"
            export MIDTRANS_SNAP_BASE_URL="${PROD_MIDTRANS_SNAP_BASE_URL:-https://app.sandbox.midtrans.com}"
            "$APP_DIR/deploy/scripts/deploy-prod.sh" "${PROD_DOCKER_IMAGE}"
            docker image prune -f
