name: CI Feature Auth

on:
  push:
    branches: ['feature/auth-module']
  pull_request:
    branches: ['feature/auth-module']

jobs:
  test-feature-auth:
    name: Test & Quality Check (Feature Auth)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests (Auth module only)
        run: ./gradlew test --tests "id.ac.ui.cs.advprog.jsonbackend.auth.**" -Dspring.profiles.active=test

      - name: SonarCloud Scan (Auth module)
        run: ./gradlew sonar \
          -Dsonar.branch.name=${{ github.head_ref || github.ref_name }} \
          -Dsonar.inclusions=src/main/java/id/ac/ui/cs/advprog/jsonbackend/auth/** \
          --info --no-parallel --no-configuration-cache
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}