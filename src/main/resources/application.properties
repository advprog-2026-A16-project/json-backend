spring.application.name=json-backend
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
jwt.secret=${JWT_SECRET_KEY}
app.frontendDev=http://localhost:3000
app.frontendProd=dummy
midtrans.server-key=${MIDTRANS_SERVER_KEY:}
midtrans.snap.base-url=${MIDTRANS_SNAP_BASE_URL:https://app.sandbox.midtrans.com}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.probes.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
